name: Reusable CI (Build + Test)

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        default: "21"
      run_tests:
        required: false
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - name: Build
        run: |
          if [ -f "mvnw" ]; then
            chmod +x mvnw
            ./mvnw -B -DskipTests package
          else
            mvn -B -DskipTests package
          fi

      - name: Test
        if: ${{ inputs.run_tests }}
        run: |
          if [ -f "mvnw" ]; then
            ./mvnw -B test
          else
            mvn -B test
          fi
          
      - name: Build Docker image
        run: |
          docker build -t demo-service:${{ github.sha }} .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-build-artifact
          path: target/*.jar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker image
        run: |
          docker tag demo-service:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/demo-service:${{ github.sha }}
          docker tag demo-service:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/demo-service:latest

      - name: Snyk Container Scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: demo-service:${{ github.sha }}
          args: --severity-threshold=high
          

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/demo-service:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/demo-service:latest
