name: Reusable CI (Build + Test)

on:
  workflow_call:
    inputs:
      deploy_target:
        required: false
        type: string
        default: dev
      image_name:
        required: true
        type: string
      delivery_mode:
        required: false
        type: string
        default: trunk
      java_version:
        required: false
        type: string
        default: "21"
      run_tests:
        required: false
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - name: Build
        run: |
          if [ -f "mvnw" ]; then
            chmod +x mvnw
            ./mvnw -B -DskipTests package
          else
            mvn -B -DskipTests package
          fi

      - name: Test
        if: ${{ inputs.run_tests }}
        run: |
          if [ -f "mvnw" ]; then
            ./mvnw -B test
          else
            mvn -B test
          fi

          
      - name: Build Docker image 
        run: | 
          docker build -t ${{ inputs.image_name }}:${{ github.sha }} .

          
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-build-artifact
          path: target/*.jar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker image
        run: |
          docker tag ${{ inputs.image_name }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}
          docker tag ${{ inputs.image_name }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Snyk Container Scan (CLI)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk container test ${{ inputs.image_name }}:${{ github.sha }} \
            --severity-threshold=high \
            --file=Dockerfile \
            --json > snyk-results.json || true

          # Fail the job only if HIGH/CRITICAL vulnerabilities exist
          if grep -q '"severity":"high"\|"severity":"critical"' snyk-results.json; then
            echo "High/Critical vulnerabilities found"
            exit 1
          fi

          echo "No High/Critical vulnerabilities found"
          

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest

      - name: Cleanup
        if: always()
        run: |
          docker image prune -af || true
          
      - name: Trunk deploy
        if: ${{ inputs.delivery_mode == 'trunk' }}
        run: |
          echo "Trunk-based mode: deploy automatically after successful CI"

      - name: Release train hold
        if: ${{ inputs.delivery_mode == 'release-train' }}
        run: |
          echo "Release-train mode: artifact is ready, waiting for scheduled release/promotion"
          
  deploy:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Trunk deploy
        if: ${{ inputs.delivery_mode == 'trunk' }}
        run: |
          echo "Deploying ${{ inputs.image_name }} to ${{ inputs.deploy_target }} in trunk mode"

      - name: Release-train deploy
        if: ${{ inputs.delivery_mode == 'release-train' }}
        run: |
          echo "Promoting ${{ inputs.image_name }} to ${{ inputs.deploy_target }} in release-train mode"
